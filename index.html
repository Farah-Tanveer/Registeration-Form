<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

</head>
<body>
    <div class="container mt-5">
    <div class="card">
        <h1 class="text-center mb-4">Registration Form</h1>

        <form id="register">

            <div class="mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input
                    type="text"
                    id="firstName"
                    class="form-control"
                    placeholder="Enter your first name">

                <small id="firstNameError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input
                    type="text"
                    id="lastName"
                    class="form-control"
                    placeholder="Enter your last name">

                <small id="lastNameError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Enter your email">

                <small id="emailError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="tel" class="form-label">Phone Number</label>
                <input
                    type="tel"
                    id="tel"
                    class="form-control"
                    placeholder="Enter your phone number">

                <small id="telError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter password">

                <small id="passwordError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    class="form-control"
                    placeholder="Re-enter your password">

                <small id="confirmPasswordError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Gender</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male">
                    <label class="form-check-label" for="male">Male</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                    <label class="form-check-label" for="female">Female</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="transgender" value="Transgender">
                    <label class="form-check-label" for="transgender">Transgender</label>
                </div>

                <small id="genderError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label for="country-select" class="form-label">Country</label>
            <select id="country-select" class="form-select">
                    <option value="">Select your country...</option>
                    <option value="PK">Pakistan</option>
                    <option value="IND">India</option>
                    <option value="US">United States</option>
                    <option value="UK">United Kingdom</option>
                    <option value="CANADA">Canada</option>
                </select>

                <small id="countryError" class="text-danger"></small>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="terms">

                <label class="form-check-label" for="terms">
                    I hereby accept all the terms and conditions for applying to your institution.
                </label>

                <small id="termsError" class="text-danger d-block"></small>
            </div>

            <div class="d-flex align-center justify-content-center">
                <button type="submit" class="btn btn-primary w-50">
                    Submit
                </button>
            </div>

        </form>
    </div>
</div>
<div class="mx-auto my-4 w-75">
    <table id="showData" class="table table-striped table-bordered table-hover table-middle ms-10">
        <thead>
            <tr class=" table-dark text-bold">
                <th scope="col">First name</th>
                <th scope="col">Last name</th>
                <th scope="col">Email</th>
                <th scope="col">Phone no.</th>
                <th scope="col">Password</th>
                <th scope="col">Confirm Password</th>
                <th scope="col">Gender</th>
                <th scope="col">Country</th>
                <th scope="col">Controls</th>
            </tr>
        </thead>
        <tbody id="tableData">
        </tbody>
    </table>
</div>
<div class="modal fade" id="viewmodal" tabindex="-1" inert>
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">View Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
        <p><strong>First Name:</strong> <span id="modalfirst"></span></p>
        <p><strong>Last Name:</strong> <span id="modallast"></span></p>
        <p><strong>Email:</strong> <span id="modalEmail"></span></p>
        <p><strong>Phone:</strong> <span id="modalPhone"></span></p>
        <p><strong>Gender:</strong> <span id="modalGender"></span></p>
        <p><strong>Country:</strong> <span id="modalCountry"></span></p>
        
        </div>

        <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="script.js"></script>
<script src="jQuery.js"></script>
</body>
</html>
